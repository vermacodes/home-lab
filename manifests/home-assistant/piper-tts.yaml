apiVersion: apps/v1
kind: Deployment
metadata:
  name: piper-tts
  namespace: home-assistant
  labels:
    app: piper-tts
spec:
  replicas: 1  # Pinned to node-2
  selector:
    matchLabels:
      app: piper-tts
  template:
    metadata:
      labels:
        app: piper-tts
    spec:
      nodeSelector:
        kubernetes.io/hostname: node-2
      containers:
      - name: piper
        image: lscr.io/linuxserver/piper:latest
        ports:
        - containerPort: 10200
          name: http
        env:
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        - name: TZ
          value: "America/New_York"  # Adjust for Atlanta
        - name: PIPER_VOICE
          value: "en_US-amy-medium"  # Small, fast quantized voice
        - name: PIPER_LENGTH_SCALE
          value: "1.5"
        - name: PIPER_NOISE_SCALE
          value: "1.0"
        - name: LOCAL_ONLY
          value: "false"  # Allow cluster access
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          tcpSocket:
            port: 10200
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 10200
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: piper-tts-service
  namespace: home-assistant
spec:
  selector:
    app: piper-tts
  ports:
  - name: http
    port: 10200
    targetPort: 10200
    protocol: TCP
  type: ClusterIP